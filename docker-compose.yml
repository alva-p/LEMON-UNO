version: "3.9"

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: uno
      POSTGRES_PASSWORD: supersecret
      POSTGRES_DB: uno_db
    ports:
      - "5432:5432"
    volumes:
      - uno-postgres-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  uno-postgres-data:
