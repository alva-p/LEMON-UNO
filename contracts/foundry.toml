[profile.default]
src = "src"
out = "out"
libs = ["lib"]

remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/openzeppelin-contracts/lib/forge-std/src/"
]

[default]
# Use a modern stable compiler supported by Foundry on most setups
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200
